name: Reading Room feed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reading-room-feed
  cancel-in-progress: false

jobs:
  crawl:
    if: vars.READING_ROOM_ENABLED != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Crawl and auto-publish
        run: python scripts/reading_room_feeds.py --output content/reading-room/ --cap 18

      - name: Commit refreshed feed
        run: |
          git config user.name "mcdevitt-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/reading-room
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore(reading-room): refresh feed"
            git push
          fi
