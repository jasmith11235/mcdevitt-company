name: News crawler

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-crawler
  cancel-in-progress: false

jobs:
  crawl:
    if: vars.NEWS_ENABLED != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Crawl trade press into drafts
        run: python scripts/crawler.py --type news --output content/news/ --max 15

      - name: Commit new drafts
        run: |
          git config user.name "mcdevitt-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/news
          if git diff --staged --quiet; then
            echo "No new drafts."
          else
            git commit -m "chore(news): new crawler drafts"
            git push
          fi
